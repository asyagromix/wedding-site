<script>
setInterval(() => {
  try {
    const allEls = Array.from(document.querySelectorAll("*"));

    for (let el of allEls) {
      let txt = (el.textContent || "").toUpperCase().trim();
      if (txt === "НАШИ ТЁПЛЫЕ ПОЖЕЛАНИЯ" || txt === "ТЁПЛЫЕ ПОЖЕЛАНИЯ") {
         wishesNode = el;
      }
      if (txt === "ОТПРАВИТЬ") {
         quizNode = el;
      }
    }
    
    // UI Layout Logic
    if (wishesNode && quizNode) {
        let wBlock = wishesNode;
        while (wBlock.parentElement && wBlock.parentElement.tagName !== "MAIN" && wBlock.parentElement.id !== "__next") {
            wBlock = wBlock.parentElement;
        }
        
        let qBlock = quizNode;
        while (qBlock.parentElement && qBlock.parentElement.tagName !== "MAIN" && qBlock.parentElement.id !== "__next") {
            qBlock = qBlock.parentElement;
        }
        
        if (wBlock !== qBlock && qBlock.previousElementSibling !== wBlock) {
             qBlock.parentElement.insertBefore(wBlock, qBlock);
        }
        
        let next = qBlock.nextElementSibling;
        while (next && next.textContent.trim().length < 50 && !next.textContent.toUpperCase().includes("БУДЕМ РАДЫ") && !next.textContent.toUpperCase().includes("ЖДЕМ")) {
            next.style.display = 'none';
            next = next.nextElementSibling;
        }
        
        let sections = document.querySelectorAll('section, main > div');
        for (let s of sections) {
            if (s.textContent.trim().length < 10) {
                s.style.display = 'none';
            }
        }
    }
    
    // VK FORM INTERCEPT LOGIC
    let submitBtn = Array.from(document.querySelectorAll('button, .btn')).find(el => el.textContent.trim().toUpperCase() === "ОТПРАВИТЬ");
    if (submitBtn && !submitBtn.dataset.vkBound) {
        submitBtn.dataset.vkBound = '1';
        
        submitBtn.addEventListener('click', () => {
            let formWrapper = submitBtn.closest('section') || submitBtn.closest('form') || document.body;
            let data = {};
            let inputs = formWrapper.querySelectorAll('input, textarea');
            
            for (let i of inputs) {
                // Check if it's a required field and it's empty - let native validation handle it first
                
                if (i.type === 'radio' || i.type === 'checkbox') {
                     if (i.checked) {
                         let labelText = "";
                         if (i.labels && i.labels.length > 0) labelText = i.labels[0].textContent;
                         else if (i.nextElementSibling && (i.nextElementSibling.tagName === 'SPAN' || i.nextElementSibling.tagName === 'LABEL')) labelText = i.nextElementSibling.textContent;
                         else if (i.parentElement.textContent.trim()) labelText = i.parentElement.textContent;
                         
                         let finalVal = i.value && i.value !== 'on' ? i.value : labelText.trim();
                         if (!finalVal) finalVal = "Выбрано";
                         
                         // Try to find the question title
                         let group = i.closest('.radio-group') || i.closest('fieldset') || i.closest('div[role="group"]') || i.parentElement.parentElement;
                         let groupTitle = group.querySelector('h1, h2, h3, h4, .title, .question-title, p');
                         let category = i.name || (groupTitle ? groupTitle.textContent.trim() : "Выбор");
                         
                         if (!data[category]) data[category] = [];
                         data[category].push(finalVal); 
                     }
                } else if (i.type !== 'hidden') {
                     let name = i.placeholder || i.name || "Поле";
                     if (i.value.trim() !== '') {
                         data[name] = i.value;
                     }
                }
            }
            
            // Format arrays
            let finalData = {};
            for (let k in data) {
                if (Array.isArray(data[k])) finalData[k] = data[k].join(", ");
                else finalData[k] = data[k];
            }
            
            // Send to our local proxy which forwards to VK
            fetch('/submit_form', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(finalData)
            });
            
            // Clear the form after a short delay so Eventrix's native logic has time to grab data
            setTimeout(() => {
                for (let i of inputs) {
                    if (i.type === 'radio' || i.type === 'checkbox') {
                        if (i.checked) {
                            i.checked = false;
                            i.dispatchEvent(new Event('change', { bubbles: true }));
                            i.removeAttribute('data-checked');
                            if (i.parentElement) i.parentElement.removeAttribute('data-checked');
                            if (i.nextElementSibling) i.nextElementSibling.removeAttribute('data-checked');
                        }
                    } else if (i.type !== 'hidden' && i.type !== 'button' && i.type !== 'submit') {
                        i.value = '';
                        i.dispatchEvent(new Event('input', { bubbles: true }));
                        i.dispatchEvent(new Event('change', { bubbles: true }));
                    }
                }
                
                // Visual feedback on the button
                let oldText = submitBtn.textContent;
                let oldBg = submitBtn.style.backgroundColor;
                submitBtn.textContent = "ОТПРАВЛЕНО ✓";
                submitBtn.style.setProperty('background-color', '#4CAF50', 'important');
                
                setTimeout(() => {
                    submitBtn.textContent = oldText;
                    submitBtn.style.backgroundColor = oldBg;
                }, 3000);
            }, 500);
        });
    }
    
    // COLOR REPLACEMENT LOGIC
    let allTextNodes = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, null, false);
    let node;
    let namesColor = '';
    
    // First pass to find the color of the names
    while ((node = allTextNodes.nextNode())) {
        let text = node.nodeValue.toUpperCase();
        if (text.includes("ДЕНИС") || text.includes("ПОЛИНА")) {
            let p = node.parentElement;
            if (p) {
                let col = getComputedStyle(p).color;
                if (col && col !== 'rgba(0, 0, 0, 0)' && col !== 'transparent') {
                    namesColor = col;
                }
            }
        }
    }
    
    // Second pass to apply colors
    allTextNodes = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, null, false);
    while ((node = allTextNodes.nextNode())) {
        let p = node.parentElement;
        if (!p) continue;
        
        // Remove the 1000 rubles penalty text if it exists
        if (node.nodeValue.includes("Если кто-то не сдержится") || node.nodeValue.includes("штрафом в размере")) {
            node.nodeValue = node.nodeValue.replace(/Если кто-то не сдержится[\s\S]*/, '').trim();
        }
        
        let text = node.nodeValue.toUpperCase();
        
        let inProgramSection = false;
        let parentSection = p.closest('section') || p.closest('main > div');
        if (parentSection) {
            let pText = parentSection.textContent.toUpperCase();
            if (pText.includes("НАШ ДЕНЬ") || pText.includes("КАК ПРОЙДЁТ") || pText.includes("ЦЕРЕМОНИЯ") || pText.includes("БАНКЕТ") || pText.includes("ПЛАТОЧКИ")) {
                inProgramSection = true;

        // Always inject address under ФУРШЕТ regardless of color section
        if (text.trim() === "ФУРШЕТ") {
            if (!p.hasAttribute('data-address-added')) {
                p.setAttribute('data-address-added', 'true');
                let addr = document.createElement('div');
                addr.textContent = "Октябрьский пр., 49";
                addr.style.setProperty('color', 'rgba(255, 255, 255, 0.8)', 'important');
                addr.style.setProperty('font-size', '16px', 'important');
                addr.style.setProperty('margin-top', '8px', 'important');
                addr.style.setProperty('text-align', 'center', 'important');
                addr.style.setProperty('font-family', 'inherit', 'important');
                p.parentNode.insertBefore(addr, p.nextSibling);
            }
        }
        
        if (inProgramSection) {
            p.classList.remove('green-text-override');
            
            // Remove from parents as well just in case
            let curr = p;
            while(curr && curr !== parentSection) {
                curr.classList.remove('green-text-override');
                curr = curr.parentElement;
            }
            
            // Only make 14:00 and Торжественная регистрация white
            if (text.includes("14:00") || text.includes("ТОРЖЕСТВЕННАЯ РЕГИСТРАЦИЯ")) {
                p.style.setProperty('color', '#ffffff', 'important');
                p.style.setProperty('-webkit-text-fill-color', '#ffffff', 'important');
            } else if (text.includes("ОКТЯБРЬСКИЙ ПР., 49")) {
                p.style.setProperty('color', 'rgba(255, 255, 255, 0.8)', 'important');
                p.style.setProperty('-webkit-text-fill-color', 'rgba(255, 255, 255, 0.8)', 'important');
            } else if (text.includes("НА ВСЯКИЙ СЛУЧАЙ ПРИГОТОВЬТЕ ПЛАТОЧКИ")) {
                p.style.setProperty('color', 'rgba(255, 255, 255, 0.7)', 'important');
                p.style.setProperty('-webkit-text-fill-color', 'rgba(255, 255, 255, 0.7)', 'important');
            } else {
                // Remove the forced white if it was set previously so it falls back to original
                p.style.removeProperty('color');
                p.style.removeProperty('-webkit-text-fill-color');
            }
        } else if (text.includes("25.11.2026")) {
            if (namesColor) {
                p.style.setProperty('color', namesColor, 'important');
            }
        } else if (text === "ДАТА" || text.includes("ДАТА") || text.includes("ПРОВЕДЕНИЯ СВАДЬБЫ") || text.includes("СВАДЬБЫ") || text === "СОВСЕМ СКОРО" || text === "ДО ДНЯ" || text === "НАШЕЙ СВАДЬБЫ") {
            p.style.setProperty('color', '#ffffff', 'important');
        } else if (text.includes("ЦВЕТЫ – ЭТО ПРЕКРАСНО") || text.includes("ВМЕСТО БУКЕТА ВЫ ПОДАРИТЕ")) {
            p.style.setProperty('color', 'rgba(255, 255, 255, 0.8)', 'important');
        } else if (text.includes("VOPOUE") || text.includes("ДОРОГИЕ") || text.includes("НАШИ ГОСТИ") || text.includes("ЕСЛИ ВЫ ЧИТАЕТЕ") ||

            text.includes("МЕСТО") || text === "ПРОВЕДЕНИЯ" || text.includes("ДЛЯ ВАШЕГО УДОБСТВА") ||
            text.includes("14:00") || text.includes("КАРЛА МАРКСА") || text.includes("25 НОЯБРЯ 2026") ||
            text.includes("БУДЕМ РАДЫ") || text.includes("НА НАШЕМ ПРАЗДНИКЕ") || text.includes("НАШЕМ ПРАЗДНИКЕ")) {
            p.style.setProperty('color', '#0c2610', 'important');
        }
    }
    
    for (let s of document.querySelectorAll('section, main > div')) {
        let txt = s.textContent.toUpperCase();
        if (txt.includes("ВОПРОСЫ") && txt.includes("ГОСТЕЙ")) {
            for (let el of s.querySelectorAll('*')) {
                if (el.tagName !== 'BUTTON' && !el.classList.contains('btn') && el.tagName !== 'INPUT' && el.tagName !== 'TEXTAREA') {
                    // Only apply to text containers to avoid overriding input backgrounds
                    if (el.children.length === 0 || el.tagName === 'LABEL' || el.tagName === 'H1' || el.tagName === 'H2' || el.tagName === 'H3' || el.tagName === 'P' || el.tagName === 'SPAN') {
                        el.style.setProperty('color', '#0c2610', 'important');
                    }
                }
                // Aggressive JS override for radios and checkboxes
                let inputs = s.querySelectorAll('input[type="radio"], input[type="checkbox"]');

                    let label = i.closest('label') || i.parentElement;
                    if (i.checked) {
                        i.style.setProperty('accent-color', '#0c2610', 'important');

                            let elements = label.querySelectorAll('span, div, svg, path');

                                // If it's an SVG
                                if (el.tagName.toLowerCase() === 'svg' || el.tagName.toLowerCase() === 'path') {
                                    el.style.setProperty('fill', '#0c2610', 'important');

                                        el.style.setProperty('background-color', '#0c2610', 'important');
                                        el.style.setProperty('border-color', '#0c2610', 'important');
                                        el.style.setProperty('box-shadow', 'inset 0 0 0 10px #0c2610', 'important');
                                    }
                                }
                            }
                        }
                    } else {
                        // Clean up if unchecked
                        if (label) {
                            let elements = label.querySelectorAll('span, div, svg, path');
                            for (let el of elements) {
                                if (el.style.getPropertyValue('background-color') === '#0c2610' || el.style.getPropertyValue('background-color') === 'rgb(12, 38, 16)') {
                                    el.style.removeProperty('background-color');
                                    el.style.removeProperty('border-color');
                                    el.style.removeProperty('box-shadow');
                                }
                                if (el.style.getPropertyValue('fill') === '#0c2610' || el.style.getPropertyValue('fill') === 'rgb(12, 38, 16)') {
                                    el.style.removeProperty('fill');
                                    el.style.removeProperty('stroke');
                                }
                            }
                        }
                    }
                }
                
                // Keep the original data-checked fallback
                if (el.hasAttribute('data-checked') || el.getAttribute('aria-checked') === 'true') {
                    if (el.className && typeof el.className === 'string' && el.className.includes('control')) {
                        el.style.setProperty('background-color', '#0c2610', 'important');
                        el.style.setProperty('border-color', '#0c2610', 'important');
                        el.style.setProperty('box-shadow', 'inset 0 0 0 10px #0c2610', 'important');
                        el.style.setProperty('color', '#ffffff', 'important');
                    }
                }
                // Also look for any maroon colored background inside this section
                let bg = el.style.backgroundColor || getComputedStyle(el).backgroundColor;
                if (bg === 'rgb(72, 58, 45)' || bg === '#483a2d' || bg === 'rgb(99, 23, 27)' || bg === '#63171b' || (bg.includes('rgb') && el.className.includes('control'))) {
                     if (el.hasAttribute('data-checked') || el.getAttribute('aria-checked') === 'true') {
                          el.style.setProperty('background-color', '#0c2610', 'important');
                          el.style.setProperty('border-color', '#0c2610', 'important');
                          el.style.setProperty('box-shadow', 'inset 0 0 0 10px #0c2610', 'important');
                     }
                }
            }
        }
        
        // Find dress code circles and change the 6th one
        if (txt.includes("ДРЕСС-КОД") || txt.includes("ДРЕСС КОД")) {
            // Find elements that look like circles (they usually have border-radius 50% or are small squares/circles with background colors)
            let colorElements = Array.from(s.querySelectorAll('*')).filter(el => {
                let bg = el.style.backgroundColor || getComputedStyle(el).backgroundColor;
                return bg && bg !== 'rgba(0, 0, 0, 0)' && bg !== 'transparent' && el.children.length === 0 && !el.classList.contains('btn');

            // Try to match the specific rgb color rgb(191, 210, 188) which corresponds to #bfd2bc
            for (let el of colorElements) {

                if (bg.replace(/\s+/g, '') === 'rgb(191,210,188)' || bg === '#bfd2bc') {
                    el.style.setProperty('background-color', '#8A987F', 'important');
                }
            }
        }
    }
    
    if (submitBtn) {
        submitBtn.style.setProperty('background-color', '#0c2610', 'important');
        submitBtn.style.setProperty('border-color', '#0c2610', 'important');
        submitBtn.style.setProperty('color', '#ffffff', 'important');
        let children = submitBtn.querySelectorAll('*');
        for (let child of children) {
            child.style.setProperty('color', '#ffffff', 'important');
        }
    }
    
  } catch (e) { }
}, 500);
